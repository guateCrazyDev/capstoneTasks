spring.application.name=SupportTicket
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/capstone?createDatabaseIfNotExist=true
#spring.datasource.url = jdbc:mysql://database-2.c9wzzqrmu44l.us-east-1.rds.amazonaws.com/student?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
file.upload-dir=C:/uploads/images

# Port
